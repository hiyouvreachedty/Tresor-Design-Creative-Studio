<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tresor Design Creative Studio</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;900&family=Libre+Baskerville:wght@400;700&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/@studio-freight/lenis@1.0.42/dist/lenis.min.js"></script>
  <style>
    :root {
      --color-background: #0D1117;
      --color-background-alt: #161B22;
      --color-black: #080808;
      --color-gold: #FFD700;
      --color-neon-green: #0AFF0A;
      --color-off-white: #F5F5F5;
    }
    html, body {
      overflow: hidden;
    }
    body {
      font-family: 'Inter', sans-serif;
      background-color: var(--color-background);
      color: var(--color-off-white);
    }

    .font-title {
      font-family: 'Libre Baskerville', serif;
    }
    
    /* Gritty/Noise overlay effect */
    body::before {
      content: "";
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100vh;
      background-image: url('data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCAzMDAgMzAwIj48ZmlsdGVyIGlkPSJub2lzZSI+PGZlVHVyYnVsZW5jZSB0eXBlPSJmcmFjdGFsTm9pc2UiIGJhc2VGcmVxdWVuY3k9IjAuNiIgbnVtT2N0YXZlcz0iNSIgc3RpdGNoVGlsZXM9InN0aXRjaCIvPjwvZmlsdGVyPjxyZWN0IHdpZHRoPSIxMDAlIiBoZWlnaHQ9IjEwMCUiIGZpbHRlcj0idXJsKCNub2lzZSIpPjwvcmVjdD48L3N2Zz4=');
      opacity: 0.85;
      mix-blend-mode: overlay;
      pointer-events: none;
      z-index: 9999;
    }

    /* Custom scrollbar styles */
    .custom-scrollbar::-webkit-scrollbar {
        display: none;
    }
    .custom-scrollbar {
        -ms-overflow-style: none;
        scrollbar-width: none;
    }

    /* Animations */
    @keyframes fade-in {
      0% { opacity: 0; }
      100% { opacity: 1; }
    }
    .animate-fade-in {
      animation: fade-in 0.5s ease-in-out;
    }
    @keyframes fade-in-fast {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    .animate-fade-in-fast {
      animation: fade-in-fast 0.3s ease-out forwards;
    }
    @keyframes scale-in {
      from { transform: scale(0.95); opacity: 0; }
      to { transform: scale(1); opacity: 1; }
    }
    .animate-scale-in {
      animation: scale-in 0.3s ease-out forwards;
    }
  </style>

</head>

</html>
